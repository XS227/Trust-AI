<!doctype html>
<html lang="no">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Logg inn | TrustAI</title>
<style>body{font-family:Inter,Arial,sans-serif;background:linear-gradient(160deg,#0f172a,#111827);color:#e2e8f0;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.card{width:100%;max-width:420px;background:#0b1220;border:1px solid #334155;border-radius:14px;padding:24px}.hide{display:none}.msg{margin-top:12px;padding:10px;border-radius:9px;display:none}.msg.show{display:block}.ok{background:#102a1a;border:1px solid #14532d;color:#bbf7d0}.error{background:#3f1d1d;border:1px solid #7f1d1d;color:#fecaca}input,button{width:100%;padding:11px;border-radius:10px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;box-sizing:border-box}button{margin-top:12px;background:#2563eb;color:#fff;border:0}.secondary{background:#fff;color:#0f172a}.meta{margin-top:14px}</style></head>
<body><div class="card"><h1 id="title">Logg inn</h1><p id="help">Logg inn for å komme til riktig TrustAI-dashboard.</p>
<form id="loginForm"><label>E-post</label><input id="email" type="email" required><div id="passwordWrap"><label>Passord</label><input id="password" type="password" required></div><button id="loginBtn">Logg inn</button><button id="forgotBtn" type="button" class="hide">Send passord</button><button id="gmailBtn" type="button" class="secondary">Logg inn med Google</button></form>
<div id="message" class="msg"></div><div class="meta"><a href="#" id="forgotLink">Glemt passord?</a><a href="#" id="backLink" class="hide">Tilbake til innlogging</a></div></div>
<script>
const qs=new URLSearchParams(location.search);const msg=document.getElementById('message');const loginBtn=document.getElementById('loginBtn');const forgotBtn=document.getElementById('forgotBtn');
function flash(t,ok=false){msg.className='msg show '+(ok?'ok':'error');msg.textContent=t;}
if(qs.get('reset')==='success')flash('Passordet er oppdatert. Du kan logge inn nå.',true);
const err=qs.get('error');if(err)flash('Innlogging via Google feilet. Prøv igjen.');
document.getElementById('gmailBtn').onclick=()=>location.href='/api/auth/google.php?action=start';
function setForgot(on){document.getElementById('passwordWrap').classList.toggle('hide',on);document.getElementById('gmailBtn').classList.toggle('hide',on);loginBtn.classList.toggle('hide',on);forgotBtn.classList.toggle('hide',!on);document.getElementById('forgotLink').classList.toggle('hide',on);document.getElementById('backLink').classList.toggle('hide',!on);document.getElementById('title').textContent=on?'Glemt passord':'Logg inn';document.getElementById('help').textContent=on?'Skriv din e-post, så sender vi deg hjelp til å få nytt passord hvis du er registrert fra før.':'Logg inn for å komme til riktig TrustAI-dashboard.';}
document.getElementById('forgotLink').onclick=(e)=>{e.preventDefault();setForgot(true)};document.getElementById('backLink').onclick=(e)=>{e.preventDefault();setForgot(false)};
forgotBtn.onclick=async()=>{const email=document.getElementById('email').value.trim();const r=await fetch('/api/auth/forgot-password.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});const d=await r.json().catch(()=>({}));flash(d.message||'Hvis e-posten er registrert, sender vi deg en melding.',true);};
document.getElementById('loginForm').onsubmit=async(e)=>{e.preventDefault();const payload={email:email.value.trim(),password:password.value};const res=await fetch('/api/auth/login.php',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const data=await res.json().catch(()=>({}));if(!res.ok||!data.ok){flash(data.message||'Feil e-post eller passord.');return;}location.href=data.redirect||'/app.html';};
</script></body></html>
