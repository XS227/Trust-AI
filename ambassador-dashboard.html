<!doctype html><html lang="no"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TrustAI Ambassador Dashboard</title><link rel="stylesheet" href="/assets/css/trustai-dashboard.css"><script src="/assets/js/dashboard-ui.js"></script><script src="/assets/js/trustai-dashboard.js"></script></head>
<body><div class="app header-nav"><aside class="sidebar"><div class="logo">Trust<span>AI</span></div><div class="user-chip" id="profileChip"></div><nav class="nav"><a class="active" href="#">Dashboard</a><a href="#share">Del lenke</a><a href="#earn">Inntekt</a><a href="#profile">Profil</a></nav><button class="btn secondary" id="logoutBtn">Logout</button></aside>
<main class="main"><div class="topbar"><button class="btn secondary mobile-toggle" onclick="TrustAIDashboard.toggleSidebar()">☰</button><strong>Ambassador</strong><div class="muted">Referral & payouts</div></div><div class="content" id="content" style="display:none">
<div class="cards" id="kpis"></div>
<div class="grid-2"><div>
<div id="share" class="card"><h3>Din referral-lenke</h3><label class='muted'>Full referral link</label><div class="toolbar"><input class="input" id="refLink" readonly style="flex:1"><button class="btn" id="copyBtn">Kopier lenke</button></div><div class='muted' id='storeDomainInfo'></div></div>
<div id="earn" class="card"><h3>Orders</h3><div id="ordersTable"></div></div>
<div class="card"><h3>Klikk</h3><div id="clicksTable"></div></div>
</div><div>
<div class="card"><h3>Request payout</h3><div class="toolbar"><button class="btn" id="requestPayoutBtn">Request payout</button></div></div>
<div id="profile" class="card"><h3>Profil</h3><input class="input" id="pName" placeholder="Navn"><input class="input" id="pEmail" placeholder="E-post"><input class="input" id="pPhone" placeholder="Telefon"><div class="toolbar"><button class="btn" id="saveProfileBtn">Lagre profil</button></div><h4>Endre passord</h4><input class='input' id='aCurrentPassword' type='password' placeholder='Nåværende passord'><input class='input' id='aNewPassword' type='password' placeholder='Nytt passord (minst 8 tegn)'><input class='input' id='aConfirmPassword' type='password' placeholder='Bekreft nytt passord'><div class='toolbar'><button class='btn' id='aChangePasswordBtn'>Oppdater passord</button></div></div>
<div class="card"><h3>Payouts</h3><div id="payoutsTable"></div></div>
</div></div>
</div><div class="content" id="guard"></div><div class='footer'>© 2026 <a href='https://setai.no' target='_blank' rel='noopener'>SETAEI</a>. All rights reserved.</div></main></div><div class="modal-backdrop" id="globalModal"><div class="modal" id="globalModalContent"></div></div>
<script>
const ui=DashboardUI, app=TrustAIDashboard; let state={};
async function logout(){await fetch('/api/auth/logout.php',{method:'POST',credentials:'include'});location.href='/login.html';}
async function auth(){const d=await fetch('/api/auth/route.php',{credentials:'include'}).then(r=>r.json());if(!d.ok||d.role!=='ambassador'){guard.innerHTML='Ingen tilgang';return false;}content.style.display='block';guard.style.display='none';return true;}
function render(){const d=state;const m=[['Klikk',d.metrics?.clicks],['Ordre',d.metrics?.orders],['Salg',ui.formatCurrency(d.metrics?.total_sales)],['Kommisjon',ui.formatCurrency(d.metrics?.total_commission)],['Payout requests',(d.payouts||[]).filter(p=>p.status==='requested').length]];kpis.innerHTML=m.map(([k,v])=>`<div class='card'><div class='muted'>${k}</div><div class='kpi'>${ui.escapeHtml(v??0)}</div></div>`).join('');
profileChip.innerHTML=`${ui.escapeHtml(d.ambassador?.name||'Ambassador')}<br><span class='muted'>${ui.escapeHtml(d.ambassador?.status||'')}</span>`;
refLink.value=d.referral_link||'';storeDomainInfo.textContent='Tilknyttet butikk: '+(d.store?.domain||'-'); pName.value=d.ambassador?.name||''; pEmail.value=d.ambassador?.email||''; pPhone.value=d.ambassador?.phone||'';
ui.renderTable(ordersTable,d.orders||[],[{key:'id',label:'ID'},{key:'customer_name',label:'Kunde'},{key:'amount',label:'Beløp',render:v=>ui.formatCurrency(v)},{key:'commission_amount',label:'Kommisjon',render:v=>ui.formatCurrency(v)},{key:'payout_status',label:'Payout',render:v=>ui.renderBadge(v)}]);
ui.renderTable(clicksTable,d.clicks||[],[{key:'source',label:'Kilde'},{key:'referral_code',label:'Kode'},{key:'created_at',label:'Dato',render:v=>ui.formatDate(v)}]);
ui.renderTable(payoutsTable,d.payouts||[],[{key:'id',label:'ID'},{key:'amount',label:'Beløp',render:v=>ui.formatCurrency(v)},{key:'status',label:'Status',render:v=>ui.renderBadge(v)},{key:'invoice_url',label:'Faktura'}]);}
async function load(){const d=await fetch('/api/ambassador/dashboard.php',{credentials:'include'}).then(r=>r.json());if(!d.ok){app.toast('Kunne ikke laste');return;}state=d;render();}
copyBtn.onclick=async()=>{if(!refLink.value)return;await navigator.clipboard.writeText(refLink.value);app.toast('Lenke kopiert');};
requestPayoutBtn.onclick=()=>{app.showModal('Request payout',`<div class='muted'>Tilgjengelig beløp: ${ui.escapeHtml(ui.formatCurrency(state.metrics?.total_commission||0))}</div><label>Beløp *</label><input class='input' id='m_amount' type='number' step='0.01'><label>Fakturafil (PDF/JPG/PNG) *</label><input class='input' id='m_invoice' type='file' accept='.pdf,.jpg,.jpeg,.png'><label>Kommentar</label><textarea class='input' id='m_comment'></textarea>`,async()=>{const fd=new FormData();fd.append('amount',String(Number(app.qs('m_amount').value||0)));fd.append('comment',app.qs('m_comment').value);if(app.qs('m_invoice').files[0])fd.append('invoice_file',app.qs('m_invoice').files[0]);const resp=await fetch('/api/ambassador/request-payout.php',{method:'POST',credentials:'include',body:fd}).then(r=>r.json());app.toast(resp.ok?'Payout forespurt':'Feil');if(resp.ok)load();return resp.ok;},'Send');};
saveProfileBtn.onclick=async()=>{const r=await app.post('/api/ambassador/update-profile.php',{name:pName.value,email:pEmail.value,phone:pPhone.value});app.toast(r.ok?'Profil lagret':'Feil');if(r.ok)load();};
aChangePasswordBtn.onclick=async()=>{const r=await app.post('/api/auth/change-password.php',{current_password:aCurrentPassword.value,new_password:aNewPassword.value,confirm_password:aConfirmPassword.value});app.toast(r.ok?'Passord oppdatert':(r.error||'Feil'));if(r.ok){aCurrentPassword.value='';aNewPassword.value='';aConfirmPassword.value='';}};logoutBtn.onclick=logout;auth().then(ok=>ok&&load());
</script><script src="/global-footer.js"></script>
</body></html>
