<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bli ambassadør | TrustAI</title>
  <style>body{font-family:Arial,sans-serif;background:#f8fafc;padding:20px}.container{max-width:680px;margin:auto}.card{background:#fff;border:1px solid #cbd5e1;border-radius:14px;padding:22px}form{display:grid;gap:12px}input,select,button{width:100%;padding:11px;border-radius:8px;border:1px solid #cbd5e1}button{background:#0f172a;color:#fff;font-weight:bold;cursor:pointer}.status{margin-top:12px;padding:10px;border-radius:8px;display:none}.status.show{display:block;background:#eef2ff;border:1px solid #c7d2fe}</style>
</head>
<body>
  <div class="container"><div class="card">
    <h1>Bli ambassadør</h1>
    <p>Søknad blir automatisk koblet til riktig butikk via domenet og settes til <strong>pending</strong>.</p>
    <form id="f">
            <input id="name" placeholder="Navn" required>
      <input id="email" type="email" placeholder="E-post" required>
      <input id="phone" placeholder="Telefon" required>
      <input id="partner" placeholder="Domene til butikk/partner (eks. butikk.no)" required>
            <button id="submitBtn">Send søknad</button>
      <button type="button" id="gmailSignup" style="background:#fff;color:#0f172a;border:1px solid #cbd5e1">Registrer med Gmail</button>
    </form>
    <div id="status" class="status"></div>
  </div></div>
  <script>
        const status = document.getElementById('status');
    const form = document.getElementById('f');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sender...';
      const payload = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        store_url: document.getElementById('partner').value.trim(),
        domain: document.getElementById('partner').value.trim(),
      };
      try {
      const res = await fetch('/api/create-ambassador-application.php', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      const data = await res.json();
      status.className = 'status show';
      status.textContent = data.ok ? `Søknad mottatt. Status: pending. Søknads-ID: ${data.application_id}` : `Feil: ${data.message || data.error || 'ukjent'}`;
      if (data.ok) form.reset();
      } catch (err) {
        status.className = 'status show';
        status.textContent = `Feil: ${err.message}`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send søknad';
      }
    });
    document.getElementById('gmailSignup').addEventListener('click',()=>{window.location.href='/api/auth/google.php?action=start';});
  </script>
<script src="/global-footer.js"></script>
</body>
</html>
