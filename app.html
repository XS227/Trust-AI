<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TrustAI Router</title>
</head>
<body>
  <p>Sender deg videre…</p>
  <script>
    fetch('/api/auth/route.php', {credentials:'include'})
      .then(async r => ({status:r.status, data: await r.json()}))
      .then(({status, data}) => {
        if (data.ok && data.redirect) {
          location.href = data.redirect;
          return;
        }

        if (data.error === 'not_logged_in' || status === 401) {
          location.href = '/login.html';
          return;
        }

        document.body.innerHTML = 'Kunne ikke finne rute: ' + (data.error || status);
      })
      .catch(() => { location.href = '/login.html'; });
  </script>
<script src="/global-footer.js"></script>
</body>
</html>
