<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrustAI – Ambassadørdashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --ink:#101828;
  --muted:#667085;
  --line:#e4e7ec;
  --green:#12b76a;
  --green-dark:#027a48;
  --shadow:0 20px 45px rgba(16,24,40,.08);
  --radius:24px;
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#ffffff 0%,var(--bg) 34%);color:var(--ink)}
.hidden{display:none!important}
.page{min-height:100vh;display:grid;grid-template-columns:280px 1fr}
.sidebar{background:#0b1220;color:#fff;padding:28px 22px;position:sticky;top:0;height:100vh}
.brand{font-size:28px;font-weight:800;letter-spacing:-.04em;margin-bottom:32px}.brand span{color:#22c55e}
.nav{display:grid;gap:8px}.nav a{color:#cbd5e1;text-decoration:none;padding:13px 14px;border-radius:14px;font-weight:600;display:flex;align-items:center;gap:10px}.nav a.active,.nav a:hover{background:rgba(255,255,255,.1);color:#fff}
.sidebar-card{margin-top:34px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:16px}.sidebar-card small{color:#94a3b8;display:block;margin-top:6px;line-height:1.5;word-break:break-all}
main{padding:28px 34px 60px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.eyebrow{color:var(--green-dark);font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
h1{font-size:38px;line-height:1.05;letter-spacing:-.05em;margin:0}
.subtitle{color:var(--muted);margin:10px 0 0;font-size:16px}
.profile{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:8px 10px 8px 16px;box-shadow:0 8px 24px rgba(16,24,40,.06)}
.profile strong{font-size:14px}.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#2563eb);display:grid;place-items:center;color:#fff;font-weight:800}
.hero{background:linear-gradient(135deg,#ecfdf3,#eff6ff 60%,#fff);border:1px solid #dbeafe;border-radius:32px;padding:28px;display:grid;grid-template-columns:1.3fr .7fr;gap:24px;box-shadow:var(--shadow);margin-bottom:22px}
.hero h2{font-size:30px;margin:0 0 10px;letter-spacing:-.04em}.hero p{color:var(--muted);line-height:1.6;margin:0 0 20px}
.hero-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{border:0;border-radius:14px;padding:12px 16px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;font:inherit}
.btn.primary{background:var(--green);color:#052e16}.btn.dark{background:#101828;color:#fff}.btn.light{background:#fff;color:#101828;border:1px solid var(--line)}
.mini-chart{background:#fff;border:1px solid var(--line);border-radius:24px;padding:18px}
.bars{height:150px;display:flex;align-items:end;gap:10px;margin-top:18px}.bar{flex:1;border-radius:999px 999px 8px 8px;background:linear-gradient(180deg,#22c55e,#16a34a);min-height:24px}
.bar:nth-child(1){height:38%}.bar:nth-child(2){height:80%}.bar:nth-child(3){height:48%;background:linear-gradient(180deg,#60a5fa,#2563eb)}.bar:nth-child(4){height:90%}.bar:nth-child(5){height:64%;background:linear-gradient(180deg,#a78bfa,#7c3aed)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:0 10px 28px rgba(16,24,40,.05)}
.kpi span{color:var(--muted);font-size:14px;font-weight:700}.kpi strong{display:block;font-size:28px;letter-spacing:-.04em;margin-top:8px}.kpi small{display:block;color:var(--green-dark);font-weight:700;margin-top:8px}
.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:22px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:0 10px 28px rgba(16,24,40,.05)}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px}
h3{margin:0;font-size:20px;letter-spacing:-.03em}.hint{color:var(--muted);font-size:14px;margin-top:6px}
.link-box{background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:14px}.label{font-weight:800;margin-bottom:8px;display:block}
.input-row{display:flex;gap:8px;flex-wrap:wrap}input{width:100%;border:1px solid #d0d5dd;background:#fff;border-radius:14px;padding:13px 14px;font:inherit;color:var(--ink);min-width:220px}
.share-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
.share{border:1px solid var(--line);background:#fff;border-radius:16px;padding:14px 8px;text-align:center;font-weight:800;color:#344054;cursor:pointer}.share:hover{border-color:#22c55e;background:#ecfdf3}
.timeline{display:grid;gap:12px}.order{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:14px}
.dot{width:12px;height:12px;border-radius:50%;background:var(--green);box-shadow:0 0 0 6px #dcfae6}.order strong{display:block}.order span{color:var(--muted);font-size:13px}.badge{background:#dcfae6;color:#027a48;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800}
.templates{display:grid;gap:12px}.template{border:1px solid var(--line);border-radius:18px;padding:15px;background:#fff}.template strong{display:block;margin-bottom:6px}.template p{color:var(--muted);font-size:14px;line-height:1.5;margin:0 0 12px}
.error{color:#b42318;font-size:13px;margin-top:8px}
.auth-wrap{max-width:760px;margin:48px auto}.auth-wrap .card{padding:28px}
@media(max-width:1000px){.page{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.kpis,.grid,.hero{grid-template-columns:1fr}.share-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="auth-wrap" id="authCard">
  <div class="card">
    <h2>Logg inn for å se din ambassadør-side</h2>
    <p class="hint">Du kan logge inn med Gmail (Google) eller e-post.</p>
    <div class="input-row" style="margin-bottom:10px;">
      <input type="email" id="emailInput" placeholder="din@epost.no" autocomplete="email">
      <button type="button" id="emailLoginBtn" class="btn primary">Logg inn med e-post</button>
    </div>
    <button type="button" id="googleLoginBtn" class="btn dark">Logg inn med Gmail</button>
    <p id="authError" class="error"></p>
  </div>
</div>

<div id="app" class="hidden"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9ESuWhXXsevI47cY_A0YijhAawC7s0Zs",
  authDomain: "trustai-4dc55.firebaseapp.com",
  projectId: "trustai-4dc55",
  appId: "1:886529188680:web:f8008930a08db98fba497d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const storageKey = 'trustai_dashboard_email';

const authCard = document.getElementById('authCard');
const appContainer = document.getElementById('app');
const authError = document.getElementById('authError');

function getFilterFromURL() {
  const params = new URLSearchParams(window.location.search);
  return { code: (params.get('code') || '').trim(), email: (params.get('email') || '').trim() };
}

function ensureAbsoluteUrl(url) {
  const trimmed = (url || '').trim();
  if (!trimmed) return '';
  if (/^https?:\/\//i.test(trimmed)) return trimmed;
  return 'https://' + trimmed;
}

function generateReferralLink(url, ref) {
  const u = new URL(url);
  if (u.searchParams.has('ref')) u.searchParams.set('ref', ref);
  else u.searchParams.append('ref', ref);
  return u.toString();
}

function buildDefaultLink(shopUrl, ref) {
  const absoluteShopUrl = ensureAbsoluteUrl(shopUrl);
  if (!absoluteShopUrl || !ref) return '';
  try { return generateReferralLink(absoluteShopUrl, ref); }
  catch (e) { return absoluteShopUrl + '?ref=' + encodeURIComponent(ref); }
}

async function copyText(value) {
  if (!value) return;
  try { await navigator.clipboard.writeText(value); }
  catch (error) {
    const temp = document.createElement('textarea');
    temp.value = value;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand('copy');
    temp.remove();
  }
}

function formatCurrency(amount, currency = 'NOK') {
  return new Intl.NumberFormat('nb-NO', { style: 'currency', currency, minimumFractionDigits: 2 }).format(Number(amount || 0));
}

function formatDate(value) {
  if (!value) return 'Ukjent dato';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleDateString('nb-NO');
}

function dashboardMarkup(data) {
  const ambassadorName = data.ambassador_name || 'Ambassadør';
  const firstName = ambassadorName.split(' ')[0] || 'der';
  const avatar = firstName.charAt(0).toUpperCase();
  const email = data.email || '';
  const ref = data.referral_code || data.code || '';
  const defaultLink = buildDefaultLink(data.shop || '', ref);
  const sales = data.sales_count || 0;
  const revenue = data.total_revenue || 0;
  const commission = data.commission || 0;
  const conversion = sales > 0 ? Math.min(100, (sales * 12.4)).toFixed(1).replace('.', ',') + '%' : '0,0%';
  const newestOrder = data.orders[0];

  const orderMarkup = data.orders.length
    ? data.orders.map((o) => `
      <div class="order">
        <div class="dot"></div>
        <div>
          <strong>Ordre #${o.order_id || '—'}</strong>
          <span>${o.customer_email || 'Ukjent e-post'} · ${formatDate(o.created_at)}</span>
        </div>
        <strong>${formatCurrency(o.total || 0, o.currency || 'NOK')}</strong>
      </div>
    `).join('')
    : '<div class="order"><div class="dot"></div><div><strong>Ingen ordre enda</strong><span>Når salgene kommer inn, vises de her.</span></div><strong>0 kr</strong></div>';

  return `
    <div class="page">
      <aside class="sidebar">
        <div class="brand">Trust<span>AI</span></div>
        <nav class="nav">
          <a class="active" href="#">📊 Oversikt</a>
          <a href="#share">🔗 Del lenker</a>
          <a href="#orders">💰 Inntekt</a>
        </nav>
        <div class="sidebar-card">
          <strong>Din ambassadørkode</strong>
          <small>${ref || 'Mangler kode'}</small>
          <button type="button" id="logoutBtn" class="btn light" style="margin-top:12px;width:100%;">Logg ut</button>
        </div>
      </aside>
      <main>
        <div class="topbar">
          <div>
            <div class="eyebrow">Ambassadørdashboard</div>
            <h1>Hei ${firstName} 👋</h1>
            <p class="subtitle">Her ser du salg, provisjon og lenker du kan dele videre.</p>
          </div>
          <div class="profile">
            <strong>${email || 'Ingen e-post'}</strong>
            <div class="avatar">${avatar}</div>
          </div>
        </div>
        <section class="hero">
          <div>
            <h2>Del én lenke. Følg alt i sanntid.</h2>
            <p>TrustAI sporer klikk, salg og provisjon automatisk. Bruk hovedlenken din, eller lag egne lenker til bestemte produkter og sider.</p>
            <div class="hero-actions">
              <button class="btn primary" data-copy-target="default">Kopier hovedlenke</button>
              <a class="btn dark" href="#custom">Lag egen lenke</a>
              <a class="btn light" href="#orders">Se ordre</a>
            </div>
          </div>
          <div class="mini-chart">
            <strong>Salg siste periode</strong>
            <div class="bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
            <p class="hint">Siste ordre: ${newestOrder ? formatDate(newestOrder.created_at) : 'Ingen registrert ennå'}</p>
          </div>
        </section>

        <section class="kpis">
          <div class="kpi"><span>Salg</span><strong>${sales}</strong><small>Aktive ordre</small></div>
          <div class="kpi"><span>Omsetning</span><strong>${formatCurrency(revenue, newestOrder?.currency || 'NOK')}</strong><small>Registrert via deg</small></div>
          <div class="kpi"><span>Provisjon</span><strong>${formatCurrency(commission, newestOrder?.currency || 'NOK')}</strong><small>Klar til opptjening</small></div>
          <div class="kpi"><span>Konvertering</span><strong>${conversion}</strong><small>Forslag / demo</small></div>
        </section>

        <section class="grid">
          <div class="card" id="share" data-ref="${ref}">
            <div class="card-head"><div><h3>Del lenker</h3><div class="hint">Kopier lenken eller del direkte på sosiale medier.</div></div></div>
            <div class="link-box">
              <label class="label">Din hovedlenke</label>
              <div class="input-row">
                <input value="${defaultLink}" readonly data-default-link>
                <button class="btn primary" type="button" data-copy-target="default">Kopier</button>
              </div>
            </div>

            <div class="share-grid">
              <button class="share" type="button">💼 LinkedIn</button><button class="share" type="button">📘 Facebook</button><button class="share" type="button">🐦 X / Twitter</button><button class="share" type="button">💬 WhatsApp</button>
              <button class="share" type="button">📩 Messenger</button><button class="share" type="button">✉️ E-post</button><button class="share" type="button">📱 SMS</button><button class="share" type="button">📋 Kopier tekst</button>
            </div>

            <div class="link-box" id="custom" style="margin-top:18px;">
              <label class="label">Lag egen produktlenke</label>
              <div class="input-row" style="margin-bottom:10px;">
                <input placeholder="Lim inn produkt- eller sideadresse" data-custom-input>
                <button class="btn dark" type="button" data-action="generate">Generer lenke</button>
              </div>
              <div class="input-row">
                <input placeholder="Din genererte lenke vises her" readonly data-custom-output>
                <button class="btn light" type="button" data-copy-target="custom">Kopier</button>
                <a href="#" class="btn light" target="_blank" rel="noopener" data-open-link style="display:none;">Åpne</a>
              </div>
              <p class="error" data-error></p>
            </div>
          </div>

          <div class="card">
            <div class="card-head"><div><h3>Ferdige delingstekster</h3></div></div>
            <div class="templates">
              <div class="template"><strong>Anbefaling til venner</strong><p>“Jeg anbefaler denne butikken – bruk lenken min, så finner du produktet raskt.”</p><button class="btn light" type="button">Kopier tekst</button></div>
              <div class="template"><strong>Produktkampanje</strong><p>“Dette produktet er verdt å sjekke ut. Her er min direkte lenke.”</p><button class="btn light" type="button">Kopier tekst</button></div>
            </div>
          </div>
        </section>

        <section class="card" id="orders" style="margin-top:22px;">
          <div class="card-head"><div><h3>Ordre og provisjon</h3><div class="hint">Alle salg registrert gjennom ambassadørlenken din.</div></div><span class="badge">${sales} ordre</span></div>
          <div class="timeline">${orderMarkup}</div>
        </section>
      </main>
    </div>
  `;
}

function setLoggedInUI() {
  authCard.classList.add('hidden');
  appContainer.classList.remove('hidden');
}

function setLoggedOutUI() {
  authCard.classList.remove('hidden');
  appContainer.classList.add('hidden');
  appContainer.innerHTML = '';
}

async function loadDashboard(email) {
  const filter = getFilterFromURL();
  const ambassadorQuery = new URLSearchParams();
  ambassadorQuery.set('email', email);
  if (filter.code) ambassadorQuery.set('code', filter.code);

  const ambassadorsResponse = await fetch('/api/dashboard.php?' + ambassadorQuery.toString());
  const ambassadorsData = await ambassadorsResponse.json();
  const ambassadors = Array.isArray(ambassadorsData?.ambassadors) ? ambassadorsData.ambassadors : [];

  if (!ambassadors.length) {
    appContainer.innerHTML = '<div class="auth-wrap"><div class="card">Fant ingen ambassador-data for denne innloggingen.</div></div>';
    return;
  }

  const ordersResponse = await fetch('/api/list-orders.php');
  const ordersData = await ordersResponse.json();
  const allOrders = Array.isArray(ordersData?.orders) ? ordersData.orders : [];

  const selected = ambassadors[0];
  const referralCode = selected.referral_code || '';
  const orders = allOrders.filter((order) => order.ambassador_code === referralCode);
  const totalRevenue = orders.reduce((sum, order) => sum + Number(order.total || 0), 0);
  const totalCommission = orders.reduce((sum, order) => sum + Number(order.commission || 0), 0);

  const decorated = { ...selected, email, orders, sales_count: orders.length, total_revenue: totalRevenue, commission: totalCommission };
  appContainer.innerHTML = dashboardMarkup(decorated);
}

appContainer.addEventListener('click', async (event) => {
  const logoutBtn = event.target.closest('#logoutBtn');
  if (logoutBtn) {
    localStorage.removeItem(storageKey);
    try { await signOut(auth); } catch (error) { console.warn('Kunne ikke logge ut Firebase-sesjon', error); }
    setLoggedOutUI();
    return;
  }

  const shareCard = event.target.closest('#share');
  if (!shareCard) return;

  const defaultInput = shareCard.querySelector('[data-default-link]');
  const customInput = shareCard.querySelector('[data-custom-input]');
  const customOutput = shareCard.querySelector('[data-custom-output]');
  const openLink = shareCard.querySelector('[data-open-link]');
  const errorEl = shareCard.querySelector('[data-error]');
  const ref = shareCard.dataset.ref || '';

  if (event.target.matches('[data-copy-target="default"]')) {
    await copyText(defaultInput.value);
    return;
  }
  if (event.target.matches('[data-copy-target="custom"]')) {
    await copyText(customOutput.value);
    return;
  }
  if (event.target.matches('[data-action="generate"]')) {
    errorEl.textContent = '';
    try {
      const generated = generateReferralLink(ensureAbsoluteUrl(customInput.value), ref);
      customOutput.value = generated;
      openLink.href = generated;
      openLink.style.display = 'inline-flex';
    } catch (error) {
      customOutput.value = '';
      openLink.style.display = 'none';
      errorEl.textContent = 'Ugyldig URL. Prøv igjen med full eller gyldig nettadresse.';
    }
  }
});

document.getElementById('emailLoginBtn').addEventListener('click', async () => {
  const email = (document.getElementById('emailInput').value || '').trim().toLowerCase();
  authError.textContent = '';
  if (!email || !email.includes('@')) {
    authError.textContent = 'Skriv inn en gyldig e-postadresse.';
    return;
  }
  localStorage.setItem(storageKey, email);
  setLoggedInUI();
  await loadDashboard(email);
});

document.getElementById('googleLoginBtn').addEventListener('click', async () => {
  authError.textContent = '';
  try {
    const result = await signInWithPopup(auth, provider);
    const email = (result.user?.email || '').trim().toLowerCase();
    if (!email) {
      authError.textContent = 'Klarte ikke hente e-post fra Google-kontoen din.';
      return;
    }
    localStorage.setItem(storageKey, email);
    setLoggedInUI();
    await loadDashboard(email);
  } catch (error) {
    console.error(error);
    authError.textContent = 'Google-innlogging feilet. Prøv igjen.';
  }
});

onAuthStateChanged(auth, async (user) => {
  const savedEmail = (localStorage.getItem(storageKey) || '').trim().toLowerCase();
  const googleEmail = (user?.email || '').trim().toLowerCase();
  const email = googleEmail || savedEmail;

  if (!email) {
    setLoggedOutUI();
    return;
  }

  localStorage.setItem(storageKey, email);
  setLoggedInUI();

  try {
    await loadDashboard(email);
  } catch (error) {
    console.error(error);
    authError.textContent = 'Kunne ikke laste dashboard akkurat nå.';
  }
});
</script>
</body>
</html>
