<!doctype html><html lang="no"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nytt passord</title></head>
<body><main style="max-width:420px;margin:40px auto;font-family:Arial"><h1>Sett nytt passord</h1><p id="msg"></p><form id="f"><input id="p" type="password" placeholder="Nytt passord (min 8 tegn)" required minlength="8" style="width:100%;padding:10px"><button style="margin-top:10px">Lagre</button></form><p><a href="/login.html">Tilbake til innlogging</a></p></main>
<script>
const token=new URLSearchParams(location.search).get('token')||'';const msg=document.getElementById('msg');if(!token){msg.textContent='Ugyldig lenke.';document.getElementById('f').style.display='none';}
document.getElementById('f').addEventListener('submit',async e=>{e.preventDefault();const password=document.getElementById('p').value;const r=await fetch('/api/auth/reset-password.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,password})});const d=await r.json().catch(()=>({}));if(r.ok&&d.ok){location.href='/login.html?reset=success';return;}msg.textContent='Lenken er ugyldig eller utløpt.';});
</script><script src="/global-footer.js"></script>
</body></html>
