<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>TrustAI Shopify App</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f6f6f7;
    }

    .card {
      background: white;
      padding: 16px;
      margin-bottom: 16px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }

    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA9ESuWhXXsevI47cY_A0YijhAawC7s0Zs",
      authDomain: "trustai-4dc55.firebaseapp.com",
      projectId: "trustai-4dc55",
      appId: "1:886529188680:web:f8008930a08db98fba497d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const $ = (id) => document.getElementById(id);

    function getQuery() {
      const p = new URLSearchParams(window.location.search);
      return {
        shop: p.get("shop"),
        host: p.get("host")
      };
    }

    async function post(url, data) {
      return fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      }).then(r => r.json());
    }

    function referralLink(shop, code) {
      return `https://${shop}/?ref=${code}`;
    }

    async function init() {
      const q = getQuery();

      $("shop").innerText = q.shop || "not found";
      $("host").innerText = q.host || "not found";

      if (q.shop) {
        await post("/api/save-shop-data.php", q);
      }

      await post("/api/track-open.php", {
        shop: q.shop,
        host: q.host,
        url: location.href
      });

      onAuthStateChanged(auth, async (user) => {

        if (user) {
          $("status").innerText = "Logged in: " + user.email;

          await post("/api/link-user-shop.php", {
            uid: user.uid,
            email: user.email,
            displayName: user.displayName,
            shop: q.shop,
            host: q.host
          });

          const res = await post("/api/create-ambassador.php", {
            uid: user.uid,
            email: user.email,
            displayName: user.displayName,
            shop: q.shop
          });

          if (res.ok) {
            $("code").innerText = res.code;
            $("link").value = referralLink(q.shop, res.code);
          }

        } else {
          $("status").innerText = "Not logged in";
        }

      });
    }

    window.attachRefToCart = () => {
      const q = getQuery();
      const code = $("code").innerText;

      const url = `https://${q.shop}/?ref=${code}`;

      window.open(url, "_blank");
    };

    window.login = async () => {
      await signInWithPopup(auth, provider);
    };

    window.logout = async () => {
      await signOut(auth);
    };

    window.saveOnboarding = async () => {
      const q = getQuery();
      const user = auth.currentUser;

      const res = await post("/api/save-onboarding.php", {
        uid: user.uid,
        shop: q.shop,
        fullName: $("name").value,
        instagram: $("ig").value,
        niche: $("niche").value,
        notes: $("notes").value
      });

      $("onboardingStatus").innerText = res.ok ? "Saved ✅" : "Error ❌";
    };

    window.copy = async () => {
      await navigator.clipboard.writeText($("link").value);
      alert("Copied!");
    };

    window.onload = init;
  </script>
</head>

<body>

  <h1>TrustAI App</h1>

  <div class="card">
    <h3>Shopify Info</h3>
    <p>Shop: <b id="shop"></b></p>
    <p>Host: <b id="host"></b></p>
  </div>

  <div class="card">
    <h3>User</h3>
    <p id="status">Loading...</p>
    <button onclick="login()">Login with Google</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h3>Ambassador</h3>
    <p>Code: <b id="code"></b></p>

    <input id="link" placeholder="Referral link" readonly />
    <button onclick="copy()">Copy link</button>

    <!-- 🔥 NY -->
    <button onclick="attachRefToCart()">Attach referral to cart</button>
  </div>

  <div class="card">
    <h3>Storefront tracking snippet</h3>
    <p>Include this on your Shopify storefront (theme.liquid, before <code>&lt;/body&gt;</code>):</p>
    <textarea readonly><script src="https://trustai.no/public/trustai-referral.js" defer></script></textarea>
    <p>This stores <code>ref</code> in cookie/localStorage and syncs to cart attribute + line item property.</p>
  </div>

  <div class="card">
    <h3>Onboarding</h3>

    <input id="name" placeholder="Full name" />
    <input id="ig" placeholder="Instagram" />
    <input id="niche" placeholder="Niche" />
    <textarea id="notes" placeholder="Notes"></textarea>

    <button onclick="saveOnboarding()">Save</button>
    <p id="onboardingStatus"></p>
  </div>

<script src="/global-footer.js"></script>
</body>
</html>
