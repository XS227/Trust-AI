<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Registrer butikk | TrustAI</title>
<style>
  *{box-sizing:border-box}
  body{font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:linear-gradient(160deg,#0f172a,#111827);color:#e2e8f0;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{width:100%;max-width:480px;background:#0b1220;border:1px solid #334155;border-radius:16px;padding:24px}
  h1{margin:0 0 6px;font-size:22px}
  p.help{margin:0 0 14px;color:#94a3b8;font-size:14px;line-height:1.45}
  label{display:block;margin-top:12px;font-size:13px;color:#94a3b8}
  input,select,button{width:100%;padding:12px;border-radius:10px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;margin-top:6px;font-size:15px}
  input:focus,select:focus{outline:none;border-color:#2563eb}
  button{margin-top:16px;background:#2563eb;color:#fff;border:0;font-weight:600;cursor:pointer}
  button:hover{background:#1d4ed8}
  button:disabled{opacity:.6;cursor:not-allowed}
  .vipps-btn{background:#ff5b24;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px}
  .vipps-btn:hover{background:#e64f1f}
  .divider{display:flex;align-items:center;gap:10px;color:#64748b;font-size:12px;margin:18px 0 4px}
  .divider:before,.divider:after{content:"";flex:1;height:1px;background:#1f2937}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .msg{margin-top:12px;padding:10px;border-radius:10px;font-size:14px;display:none}
  .msg.show{display:block}
  .ok{background:#102a1a;border:1px solid #14532d;color:#bbf7d0}
  .error{background:#3f1d1d;border:1px solid #7f1d1d;color:#fecaca}
  .meta{margin-top:14px;text-align:center;font-size:14px;color:#94a3b8}
  .meta a{color:#60a5fa;text-decoration:none}
  .meta a:hover{text-decoration:underline}
  .vipps-note{margin-top:8px;padding:10px;border-radius:10px;background:#0f1f17;border:1px solid #14532d;color:#bbf7d0;font-size:13px;display:none}
  .vipps-note.show{display:block}
  @media (max-width:520px){
    .row{grid-template-columns:1fr}
    .card{padding:20px}
    h1{font-size:20px}
  }
</style>
</head>
<body>
<main class="card">
  <h1>Registrer din butikk</h1>
  <p class="help">Kom i gang med TrustAI for nettbutikken din på under to minutter.</p>

  <button type="button" id="vippsBtn" class="vipps-btn">Logg inn med Vipps</button>
  <div class="divider">eller registrer med e-post</div>

  <div id="vippsNote" class="vipps-note">Du er logget inn med Vipps. Fyll inn butikkdetaljer for å fullføre registreringen.</div>

  <form id="storeForm" novalidate>
    <label>Butikknavn</label>
    <input id="storeName" required>

    <label>Butikkens URL</label>
    <input id="storeUrl" placeholder="https://dinbutikk.no" required>

    <label>Plattform</label>
    <select id="platform">
      <option>Shopify</option>
      <option>WooCommerce</option>
      <option>Wix</option>
      <option>Annet</option>
    </select>

    <div id="contactBlock">
      <label>Ditt navn</label>
      <input id="contactName">

      <div class="row">
        <div>
          <label>E-post</label>
          <input id="contactEmail" type="email" required>
        </div>
        <div>
          <label>Telefon</label>
          <input id="contactPhone" type="tel">
        </div>
      </div>

      <div class="row" id="passwordBlock">
        <div>
          <label>Passord</label>
          <input id="password" type="password" minlength="8" required>
        </div>
        <div>
          <label>Bekreft passord</label>
          <input id="password2" type="password" minlength="8" required>
        </div>
      </div>
    </div>

    <button id="submitBtn" type="submit">Opprett butikk</button>
    <div id="msg" class="msg"></div>
  </form>

  <div class="meta">Allerede registrert? <a href="/login.html">Logg inn her</a></div>
</main>
<script>
(function(){
  const qs = new URLSearchParams(location.search);
  const isVipps = qs.get('vipps') === '1';

  const form = document.getElementById('storeForm');
  const msg = document.getElementById('msg');
  const submitBtn = document.getElementById('submitBtn');

  function flash(text, ok){ msg.textContent = text; msg.className = 'msg show ' + (ok ? 'ok' : 'error'); }

  document.getElementById('vippsBtn').onclick = () => {
    window.location.href = '/api/auth/vipps/login.php?intent=store';
  };

  if (isVipps) {
    document.getElementById('vippsNote').classList.add('show');
    document.getElementById('vippsBtn').style.display = 'none';
    const contactEmail = document.getElementById('contactEmail');
    contactEmail.required = false;
    contactEmail.closest('.row').style.display = 'none';
    document.getElementById('contactName').closest('label').style.display = 'none';
    document.getElementById('contactName').style.display = 'none';
    document.getElementById('passwordBlock').style.display = 'none';
    document.getElementById('password').required = false;
    document.getElementById('password2').required = false;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.classList.remove('show');

    const storeName = document.getElementById('storeName').value.trim();
    const storeUrl = document.getElementById('storeUrl').value.trim();
    const platform = document.getElementById('platform').value;
    const name = document.getElementById('contactName').value.trim();
    const email = document.getElementById('contactEmail').value.trim();
    const phone = document.getElementById('contactPhone').value.trim();
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;

    if (!storeName || !storeUrl) {
      flash('Fyll inn butikknavn og URL.');
      return;
    }
    if (!isVipps) {
      if (password !== password2) { flash('Passordene stemmer ikke overens.'); return; }
      if (password.length < 8) { flash('Passordet må være minst 8 tegn.'); return; }
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Oppretter...';

    try {
      const res = await fetch('/api/store-signup.php', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          store_name: storeName,
          store_url: storeUrl,
          platform,
          name,
          email,
          phone,
          password,
        })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.ok) {
        flash(data.message || 'Kunne ikke opprette butikk.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Opprett butikk';
        return;
      }
      flash('Butikk opprettet! Sender deg videre...', true);
      window.location.href = data.redirect || '/store-admin.html';
    } catch (err) {
      flash('Nettverksfeil. Prøv igjen.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Opprett butikk';
    }
  });
})();
</script>
</body>
</html>
