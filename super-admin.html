<!doctype html><html lang="no"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TrustAI Super Admin</title>
<link rel="stylesheet" href="/assets/css/trustai-dashboard.css"><script src="/assets/js/dashboard-ui.js"></script><script src="/assets/js/trustai-dashboard.js"></script>
</head><body>
<!-- Add the header-nav class on the app container to move the navigation to the top on larger screens.
     This aligns the super-admin dashboard with the store admin and ambassador layouts and improves
     responsiveness, especially on tablets. -->
<div class="app header-nav" id="app"><aside class="sidebar"><div class="logo">Trust<span>AI</span></div><div class="user-chip" id="userChip">Super Admin</div><nav class="nav"><a class="active" href="#">Dashboard</a></nav><button class="btn secondary" id="logoutBtn">Logout</button></aside>
<main class="main"><div class="topbar"><button class="btn secondary mobile-toggle" onclick="TrustAIDashboard.toggleSidebar()">☰</button><div><strong>Super Admin</strong></div><div class="muted">Global kontroll</div></div>
<div class="content" id="content" style="display:none">
  <div class="toolbar"><button class="btn" id="newStoreBtn">Ny butikk</button><button class="btn secondary" id="newAdminBtn">Opprett store admin</button><select id="storeFilter"><option value="">Alle butikker</option></select><input class="input" id="searchInput" placeholder="Søk butikk/ambassador/order"><button class="btn secondary" id="reloadBtn">Oppdater</button></div>
  <div id="kpis" class="cards"></div><div class='card'><h3>Endre passord</h3><input class='input' id='saCurrentPassword' type='password' placeholder='Nåværende passord'><input class='input' id='saNewPassword' type='password' placeholder='Nytt passord (minst 8 tegn)'><input class='input' id='saConfirmPassword' type='password' placeholder='Bekreft nytt passord'><div class='toolbar'><button class='btn' id='saChangePasswordBtn'>Oppdater passord</button></div></div>
  <div class="card"><h3>Butikker</h3><div id="storesTable"></div></div>
  <div class="card"><h3>Ambassadører</h3><div id="ambTable"></div></div>
</div><div class="content" id="guard"></div><div class="footer">© 2026 <a href="https://setai.no" target="_blank" rel="noopener">SETAEI</a>. All rights reserved.</div></main></div>
<div class="modal-backdrop" id="globalModal"><div class="modal" id="globalModalContent"></div></div>
<script>
const ui=DashboardUI, app=TrustAIDashboard;let cache={stores:[],ambassadors:[],metrics:{}};
const statusKey=(v)=>String(v||'').toLowerCase().trim();
const isActiveStore=(v)=>['active','aktiv'].includes(statusKey(v));
const isActiveAmb=(v)=>['approved','active','aktiv'].includes(statusKey(v));
const isPausedAmb=(v)=>['paused','pauset'].includes(statusKey(v));
const isPendingAmb=(v)=>['pending'].includes(statusKey(v));
const ownerLabel=(s)=>s.contact_name||s.contact_email||'Ikke satt';
const storeNameById=(id)=>cache.stores.find(s=>Number(s.id)===Number(id))?.name||'Ukjent butikk';
async function logout(){await fetch('/api/auth/logout.php',{method:'POST',credentials:'include'});location.href='/login.html';}
async function auth(){const r=await fetch('/api/auth/route.php',{credentials:'include'}).then(r=>r.json()); if(!r.ok||r.role!=='super_admin'){document.getElementById('guard').innerHTML='Ingen tilgang'; return false;} document.getElementById('content').style.display='block';document.getElementById('guard').style.display='none';return true;}
function filterRows(rows){const q=document.getElementById('searchInput').value.trim().toLowerCase(); if(!q)return rows;return rows.filter(o=>JSON.stringify(o).toLowerCase().includes(q));}
function field(id,label,type='text',val='',help='',extra=''){return `<label class='field-label' for='${id}'>${label}</label><input class='input' id='${id}' type='${type}' value='${ui.escapeHtml(val)}' ${extra}><div class='field-help'>${help}</div>`}
function render(){
 const d=cache;const s=filterRows(d.stores),a=filterRows(d.ambassadors);
 const m=[['Stores',d.metrics.total_stores],['Ambassadors',d.metrics.total_ambassadors],['Pending',d.metrics.pending_ambassadors],['Sales',ui.formatCurrency(d.metrics.total_sales)],['Commission',ui.formatCurrency(d.metrics.total_commission)]];
 document.getElementById('kpis').innerHTML=m.map(([k,v])=>`<div class='card'><div class='muted'>${ui.escapeHtml(k)}</div><div class='kpi'>${ui.escapeHtml(v??0)}</div></div>`).join('');
 ui.renderTable(document.getElementById('storesTable'),s,[{key:'name',label:'Butikk'},{key:'domain',label:'URL',render:(_,r)=>ui.escapeHtml(r.public_url||('https://'+r.domain))},{key:'default_commission_percent',label:'Kommisjon %'},{key:'status',label:'Status',render:v=>ui.renderBadge(v)},{key:'owner',label:'Owner',render:(_,r)=>ui.escapeHtml(ownerLabel(r))},{key:'id',label:'Actions',render:(_,r)=>`<div class='actions'><button class='btn secondary' onclick='manageStore(${r.id})'>Administrer</button> <button class='btn ${isActiveStore(r.status)?'danger':'secondary'}' onclick='toggleStoreStatus(${r.id})'>${isActiveStore(r.status)?'Deaktiver':'Aktiver'}</button></div>`}]);
 ui.renderTable(document.getElementById('ambTable'),a,[{key:'store',label:'Store',render:(_,r)=>ui.escapeHtml(r.store_name||storeNameById(r.store_id))},{key:'name',label:'Navn'},{key:'email',label:'E-post'},{key:'status',label:'Status',render:v=>ui.renderBadge(v)},{key:'commission_percent',label:'Comm %'},{key:'id',label:'Actions',render:(_,r)=>`<div class='actions'><button class='btn secondary' onclick='toggleAmbStatus(${r.id})'>${(isPausedAmb(r.status)||isPendingAmb(r.status))?'Aktiver':'Pause'}</button> <button class='btn danger' onclick='ambAction(${r.id},"reject")'>Avvis</button></div>`}]);
 if(window.__APP_DEBUG__){console.debug('[super-admin] stores rendered:',s.length);}
}
async function load(){const s=document.getElementById('storeFilter').value;const d=await fetch('/api/super-admin/dashboard.php'+(s?`?store_id=${encodeURIComponent(s)}`:''),{credentials:'include'}).then(r=>r.json());if(!d.ok){app.toast('Klarte ikke laste');return;}const payload=d.data?.stores?d.data:(d.stores?d:(d.data||{}));cache={...payload,stores:Array.isArray(payload.stores)?payload.stores:[],ambassadors:Array.isArray(payload.ambassadors)?payload.ambassadors:[],metrics:payload.metrics||{}};window.__APP_DEBUG__=Boolean(d.debug);if(window.__APP_DEBUG__){console.debug('[super-admin] stores returned:',cache.stores.length);}const filter=document.getElementById('storeFilter');const prev=filter.value;filter.innerHTML='<option value="">Alle butikker</option>'+cache.stores.map(x=>`<option value='${x.id}'>${ui.escapeHtml(x.name)}</option>`).join('');filter.value=prev;render();}
window.ambAction=async(id,act)=>{const map={reject:'/api/store-admin/reject-ambassador.php'};const r=await app.post(map[act],{ambassador_id:id});app.toast(r.ok?'Oppdatert':'Feil');if(r.ok)load();}
window.toggleAmbStatus=async(id)=>{const row=cache.ambassadors.find(a=>Number(a.id)===Number(id));const act=(isPausedAmb(row?.status)||isPendingAmb(row?.status))?'approve':'pause';const map={approve:'/api/store-admin/approve-ambassador.php',pause:'/api/store-admin/pause-ambassador.php'};const r=await app.post(map[act],{ambassador_id:id});app.toast(r.ok?'Oppdatert':'Feil');if(r.ok){row.status=act==='pause'?'paused':'approved';render();}};
window.manageStore=(id)=>{const r=cache.stores.find(s=>Number(s.id)===Number(id));app.showModal('Administrer butikk',`<div class='form-grid'>${field('m_name','Butikknavn','text',r.name,'Visningsnavn i dashboard.')}${field('m_url','Butikk URL','url',r.public_url||('https://'+r.domain),'Skriv full nettadresse til butikken, f.eks. https://example.com.')}${field('m_comm','Kommisjon %','number',r.default_commission_percent,'Må være mellom 0 og 100.','min="0" max="100" step="0.01"')}${field('m_contact_name','Kontaktperson navn','text',r.contact_name||'','Navn på kontaktperson.')}${field('m_contact_email','Kontaktperson e-post','email',r.contact_email||'','E-post til kontaktperson.')}${field('m_contact_phone','Kontaktperson telefon','text',r.contact_phone||'','Telefonnummer til kontaktperson.')}<label class='field-label' for='m_status'>Status</label><select id='m_status'><option value='active'>Aktiv</option><option value='inactive'>Inaktiv</option></select></div>`,async()=>{const url=app.qs('m_url').value.trim();const c=Number(app.qs('m_comm').value);if(!/^https?:\/\//i.test(url)){app.toast('Ugyldig URL');return false;}if(!Number.isFinite(c)||c<0||c>100){app.toast('Kommisjon må være 0-100');return false;}const body={id,name:app.qs('m_name').value.trim(),public_url:url,domain:url,status:app.qs('m_status').value,default_commission_percent:c,contact_name:app.qs('m_contact_name').value.trim(),contact_email:app.qs('m_contact_email').value.trim(),contact_phone:app.qs('m_contact_phone').value.trim()};const res=await app.post('/api/stores/update.php',body);app.toast(res.ok?'Lagret':'Feil');if(res.ok)load();return res.ok;},'Lagre endringer');app.qs('m_status').value=isActiveStore(r.status)?'active':'inactive';}
window.toggleStoreStatus=async(id)=>{const r=await app.post('/api/stores/toggle-status.php',{id});app.toast(r.ok?'Status oppdatert':'Feil');if(r.ok){const row=cache.stores.find(s=>Number(s.id)===Number(id));if(row) row.status=r.data?.status||r.status;render();}};
function newStoreModal(){app.showModal('Ny butikk',`<div class="form-grid">${field('ns_name','Butikknavn','text','','Navn på butikken.')}${field('ns_url','Butikk URL','url','','https://example.com')}${field('ns_comm','Kommisjon %','number','20','0-100')}${field('ns_email','Admin e-post','email','','Brukes til innlogging')}${field('ns_name2','Admin navn','text','','Kontaktpersonens navn')}${field('ns_phone','Admin telefon','text','','Telefonnummer')}${field('ns_pass','Passord','password','','Minst 8 tegn')}</div>`,async()=>{const url=app.qs('#ns_url').value.trim();const c=Number(app.qs('#ns_comm').value);if(!url){app.toast('URL er påkrevd');return false;}if(!Number.isFinite(c)||c<0||c>100){app.toast('Kommisjon må være 0-100');return false;}const r=await app.post('/api/super-admin/create-store-with-admin.php',{store_name:app.qs('#ns_name').value.trim(),store_url:url,commission:c,email:app.qs('#ns_email').value.trim(),name:app.qs('#ns_name2').value.trim(),phone:app.qs('#ns_phone').value.trim(),password:app.qs('#ns_pass').value});const ok=Boolean(r&&r.ok);app.toast(ok?'Butikk opprettet!':(r&&r.message)||'Feil ved opprettelse.');if(ok)await load();return ok;},'Opprett');}
window.setUserPassword=(userId)=>{app.showModal('Sett nytt passord',`<input class='input' id='su_pw' type='password' placeholder='Nytt passord (min 8)'>`,async()=>{const r=await app.post('/api/admin/set-user-password.php',{user_id:userId,new_password:app.qs('su_pw').value});app.toast(r.ok?'Passord oppdatert':'Feil');return r.ok;},'Lagre');};
document.getElementById('logoutBtn').onclick=logout;document.getElementById('reloadBtn').onclick=load;document.getElementById('storeFilter').onchange=load;document.getElementById('searchInput').oninput=render;document.getElementById('newStoreBtn').onclick=newStoreModal;document.getElementById('newAdminBtn').onclick=newAdminModal;
saChangePasswordBtn.onclick=async()=>{const r=await app.post('/api/auth/change-password.php',{current_password:saCurrentPassword.value,new_password:saNewPassword.value,confirm_password:saConfirmPassword.value});app.toast(r.ok?'Passord oppdatert':(r.error||'Feil'));if(r.ok){saCurrentPassword.value='';saNewPassword.value='';saConfirmPassword.value='';}};auth().then(ok=>ok&&load());
</script><script src="/global-footer.js"></script>
</body></html>
